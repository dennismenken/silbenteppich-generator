<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <!-- Favicons generated by RealFaviconGenerator -->
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Silbenteppich" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Local fonts -->
    <style>
      /* Geist Font */
      @font-face {
        font-family: 'Geist';
        src: url('/fonts/Geist-Regular.woff2') format('woff2');
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }

      @font-face {
        font-family: 'Geist';
        src: url('/fonts/Geist-Bold.woff2') format('woff2');
        font-weight: 700;
        font-style: normal;
        font-display: swap;
      }

      /* Andika Font */
      @font-face {
        font-family: 'Andika';
        src: url('/fonts/Andika-Regular.woff2') format('woff2');
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }

      @font-face {
        font-family: 'Andika';
        src: url('/fonts/Andika-Bold.woff2') format('woff2');
        font-weight: 700;
        font-style: normal;
        font-display: swap;
      }
    </style>

    %sveltekit.head%
  </head>
  <body class="font-geist" data-sveltekit-preload-data="hover">
    <noscript>
      <div style="padding: 2rem; text-align: center; background: #fef2f2; color: #991b1b; font-family: 'Geist', system-ui, sans-serif;">
        <p>Diese Anwendung benoetigt JavaScript, um zu funktionieren. Bitte aktivieren Sie JavaScript in Ihrem Browser.</p>
      </div>
    </noscript>
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
